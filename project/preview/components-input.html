<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div style="display:flex;flex-direction:column;gap:8px;max-width:340px">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <label style="font-family:var(--font-mono);font-size:11px;letter-spacing:.25em;text-transform:uppercase;font-weight:700;color:var(--gold)">Entity Name</label>
    <span style="font-family:var(--font-mono);font-size:9px;color:var(--muted)">[REQUIRED]</span>
  </div>
  <input value="ENTER IDENTIFIER" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--cream);font-family:var(--font-mono);font-size:12px;padding:14px;letter-spacing:0.1em;text-transform:uppercase;outline:none">
</div>
<div class="role" style="margin-top:14px">FIELD · MONO · UPPERCASE · GOLD LABEL · [REQUIRED] META</div>
</div></body></html>
