<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.rsr{display:grid;grid-template-columns:60px 1fr 60px;gap:12px;padding:11px 14px;border-bottom:1px solid rgba(242,235,217,.05);align-items:start;font-family:var(--font-mono)}
.rst{font-size:10px;color:rgba(200,168,75,.55);font-variant-numeric:tabular-nums;padding-top:2px}
.rsn{font-size:13px;color:var(--cream);font-weight:700;display:block;margin-bottom:3px}
.rsd{font-size:11px;color:rgba(242,235,217,.35);line-height:1.4}
.rss{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:rgba(200,168,75,.5);text-align:right;padding-top:3px}
.hl{border-left:2px solid var(--gold);background:rgba(200,168,75,.04)}
.hoff{background:rgba(200,168,75,.04);border-bottom:1px solid rgba(200,168,75,.1)}</style></head>
<body><div class="card" style="background:rgba(0,0,0,0.4);border:1px solid rgba(242,235,217,0.05)">
<div class="rsr hoff"><span class="rst">7:45pm</span><div><span class="rsn">→ The Handoff</span><span class="rsd">Forest path lit. 8–12 minutes.</span></div><span class="rss">↓</span></div>
<div class="rsr hl"><span class="rst">11:00pm</span><div><span class="rsn">BONTAN</span><span class="rsd">Tribal house · headline · Night 1 closer</span></div><span class="rss">Zungu Main</span></div>
<div class="rsr"><span class="rst">2:00am</span><div><span class="rsn">After set</span><span class="rsd">Extended wind-down.</span></div><span class="rss">Zungu Main</span></div>
</div></body></html>
