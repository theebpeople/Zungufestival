<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
<div class="row">
  <div class="swatch" style="flex:1"><div class="chip tall" style="background:#04080A;border:1px solid var(--border-strong)"></div><div class="chip-label"><span class="role">BG · primary</span><span class="hex">#04080A</span></div></div>
  <div class="swatch" style="flex:1"><div class="chip tall" style="background:#0D2018"></div><div class="chip-label"><span class="role">Forest green</span><span class="hex">#0D2018</span></div></div>
  <div class="swatch" style="flex:1"><div class="chip tall" style="background:#C8A84B"></div><div class="chip-label"><span class="role">Gold · accent</span><span class="hex">#C8A84B</span></div></div>
  <div class="swatch" style="flex:1"><div class="chip tall" style="background:#C45A2A"></div><div class="chip-label"><span class="role">Rust · diamond</span><span class="hex">#C45A2A</span></div></div>
  <div class="swatch" style="flex:1"><div class="chip tall" style="background:#F2EBD9"></div><div class="chip-label"><span class="role">Cream · text</span><span class="hex">#F2EBD9</span></div></div>
  <div class="swatch" style="flex:1"><div class="chip tall" style="background:#F7F3EC"></div><div class="chip-label"><span class="role">White · h1</span><span class="hex">#F7F3EC</span></div></div>
</div>
</div></body></html>
