<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body style="padding:0"><div style="height:80px;position:relative;background:#04080A">
<div style="position:absolute;top:0;left:0;height:2px;width:38%;background:var(--gold)"></div>
<div style="display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;background:rgba(4,8,10,.85);border-bottom:1px solid var(--border)">
  <div style="font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:0.15em;color:var(--gold)">ZUNGU</div>
  <div style="display:flex;gap:24px">
    <a style="font-family:var(--font-mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none">Island</a>
    <a style="font-family:var(--font-mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);text-decoration:none">Stages</a>
    <a style="font-family:var(--font-mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none">Activities</a>
    <a style="font-family:var(--font-mono);font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);text-decoration:none">Handoff</a>
  </div>
  <div style="font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;color:var(--gold);border:1px solid rgba(200,168,75,0.33);padding:4px 10px">INVESTOR</div>
</div>
<div style="position:absolute;right:14px;top:54px;display:flex;flex-direction:column;gap:8px;padding:12px"><div style="width:6px;height:6px;border-radius:50%;background:var(--gold);transform:scale(1.4)"></div><div style="width:6px;height:6px;border-radius:50%;background:rgba(200,168,75,0.25)"></div><div style="width:6px;height:6px;border-radius:50%;background:rgba(200,168,75,0.25)"></div></div>
</div></body></html>
