<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>.tk{display:grid;grid-template-columns:1fr 1fr;gap:8px}.tok{display:flex;align-items:center;gap:10px;padding:6px 10px;border:1px solid var(--border)}
.dot{width:14px;height:14px;flex:none}.k{font-family:var(--font-mono);font-size:10px;color:var(--cream)}.v{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-left:auto}</style></head>
<body><div class="card"><div class="tk">
<div class="tok"><div class="dot" style="background:#F7F3EC"></div><span class="k">--fg-1 · headings</span><span class="v">#F7F3EC</span></div>
<div class="tok"><div class="dot" style="background:#F2EBD9"></div><span class="k">--fg-2 · body</span><span class="v">#F2EBD9</span></div>
<div class="tok"><div class="dot" style="background:rgba(242,235,217,0.65)"></div><span class="k">--fg-3 · secondary</span><span class="v">/65%</span></div>
<div class="tok"><div class="dot" style="background:rgba(242,235,217,0.4)"></div><span class="k">--fg-4 · muted</span><span class="v">/40%</span></div>
<div class="tok"><div class="dot" style="background:#6B6355"></div><span class="k">--fg-5 · labels</span><span class="v">#6B6355</span></div>
<div class="tok"><div class="dot" style="background:#C8A84B"></div><span class="k">--fg-accent</span><span class="v">#C8A84B</span></div>
</div></div></body></html>
