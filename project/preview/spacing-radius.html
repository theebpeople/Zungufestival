<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card" style="display:flex;gap:24px;align-items:flex-end">
<div><div style="width:120px;height:80px;background:var(--gold);border-radius:0"></div><div class="role" style="margin-top:8px">RADIUS · 0PX</div></div>
<div><div style="width:120px;height:80px;border:1px solid var(--gold);border-radius:0"></div><div class="role" style="margin-top:8px">BORDER · 1PX GOLD</div></div>
<div><div style="width:120px;height:80px;border:3px solid var(--gold);border-right:none;border-top:none;border-bottom:none;background:rgba(200,168,75,0.04)"></div><div class="role" style="margin-top:8px">3PX LEFT · STAGE CARD</div></div>
<div><div style="width:120px;height:80px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1)"></div><div class="role" style="margin-top:8px">INPUT FILL</div></div>
</div></body></html>
