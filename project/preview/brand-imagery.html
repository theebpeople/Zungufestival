<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .shell {
    height: 230px; width: 100%;
    border: 1px solid rgba(200,168,75,0.15);
    background: #0D1F14;
    position: relative; overflow: hidden;
  }
  .shell img {
    width: 100%; height: 100%; object-fit: cover;
    filter: saturate(0.7) brightness(0.55);
  }
  .shell::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(6,8,8,0.85) 0%, rgba(6,8,8,0.15) 55%, transparent 100%);
  }
  .label {
    font-family: var(--font-mono);
    font-size: 9px; letter-spacing: 0.6em; color: var(--gold);
    text-transform: uppercase;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 14px;
  }
  .label::before { content: ''; width: 28px; height: 1px; background: var(--gold); }
  .caption {
    font-family: var(--font-mono);
    font-size: 8px; letter-spacing: 0.2em; color: rgba(242,235,217,0.18);
    text-transform: uppercase;
    margin-top: 8px;
  }
</style>
</head>
<body><div class="card" style="padding: 18px 20px;">
  <div class="label">Geographic Context · Navy Island</div>
  <div class="shell"><img src="../assets/navy-island-aerial.png" alt=""></div>
  <div class="caption">Map shell · 1px gold border (.15) · forest green · 0 radius · saturate .7 · brightness .55 · top-fade gradient</div>
</div></body></html>
