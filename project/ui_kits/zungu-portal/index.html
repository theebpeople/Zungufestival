<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Zungu Portal · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  body { margin: 0; background: #04080A; cursor: crosshair; }
  html { scroll-behavior: smooth; }
  ::selection { background: #C8A84B; color: #04080A; }
  @keyframes zfadeUp { from { opacity: 0; transform: translateY(16px); }
                       to   { opacity: 1; transform: translateY(0); } }
  @keyframes zfadeIn { from { opacity: 0; } to { opacity: 1; } }
  /* Grain overlay — fixed to body */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 1000;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.78  0 0 0 0 0.66  0 0 0 0 0.29  0 0 0 0.08 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay; opacity: 0.6;
  }
</style>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="Icons.jsx"></script>
<script type="text/babel" src="Button.jsx"></script>
<script type="text/babel" src="InputField.jsx"></script>
<script type="text/babel" src="GateView.jsx"></script>
<script type="text/babel" src="FormView.jsx"></script>
<script type="text/babel" src="DashboardView.jsx"></script>
<script type="text/babel">
  const { useState } = React;
  function App() {
    const [stage, setStage] = useState('gate');
    const [role, setRole] = useState(null);
    const handleRole = (r) => { setRole(r); setStage(r === 'attendee' ? 'dashboard' : 'form'); };
    return (
      <div data-screen-label={`Zungu · ${stage}`}>
        {stage === 'gate' && <GateView onRole={handleRole} />}
        {stage === 'form' && <FormView type={role} onBack={() => setStage('gate')}
          onSubmit={() => setStage('dashboard')} />}
        {stage === 'dashboard' && <DashboardView role={role}
          onReset={() => { setRole(null); setStage('gate'); }} />}
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
