<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZUNGU MMXXVII — Navy Island, Port Antonio, Jamaica</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    /* ── Design tokens ── */
    :root {
      --bg:        #04080A;
      --bg-alt:    #060808;
      --green:     #0D2018;
      --gold:      #C8A84B;
      --cream:     #F2EBD9;
      --white:     #F7F3EC;
      --rust:      #C45A2A;
      --muted:     #6B6355;
      --origins:   #D4722A;
      --rebirth:   #9B5FC0;
      --fg-1:      #F7F3EC;
      --fg-2:      #F2EBD9;
      --fg-3:      rgba(242,235,217,0.65);
      --fg-4:      rgba(242,235,217,0.40);
      --fg-5:      #6B6355;
      --border:        rgba(200,168,75,0.07);
      --border-strong: rgba(200,168,75,0.20);
      --border-soft:   rgba(255,255,255,0.05);
      --font-display: 'Unbounded', 'Helvetica Neue', sans-serif;
      --font-mono:    'Space Mono', ui-monospace, monospace;
      --gutter: 8vw;
      --gutter-mobile: 5vw;
    }

    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg-alt);
      color: var(--fg-2);
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      cursor: crosshair;
      overflow-x: hidden;
    }
    ::selection { background: var(--gold); color: var(--bg-alt); }

    /* ── Grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9000;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.78  0 0 0 0 0.66  0 0 0 0 0.29  0 0 0 0.07 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
      mix-blend-mode: overlay;
      opacity: 0.55;
    }

    /* ── Progress bar ── */
    #progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 2px;
      background: var(--gold);
      z-index: 8000;
      transition: width 0.1s linear;
    }

    /* ── Sticky nav ── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      z-index: 7000;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--gutter);
      background: rgba(4,8,10,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: -0.04em;
      color: var(--white);
      text-decoration: none;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2.5rem;
    }
    .nav-links a {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }
    .nav-apply {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(200,168,75,0.35);
      padding: 0.4rem 1rem;
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .nav-apply:hover { background: var(--gold); color: var(--bg-alt); }
    @media (max-width: 700px) {
      .nav-links { display: none; }
    }

    /* ── Side dots ── */
    .side-dots {
      position: fixed;
      right: 28px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 6000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: rgba(200,168,75,0.3);
      transform: rotate(45deg);
      transition: background 0.3s, transform 0.3s;
      cursor: crosshair;
    }
    .dot.active {
      background: var(--gold);
      transform: rotate(45deg) scale(1.4);
    }
    @media (max-width: 900px) { .side-dots { display: none; } }

    /* ── Scroll reveal ── */
    .reveal {
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Hero ── */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 52px 2rem 2rem;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('/photos/navy-island-aerial.jpg');
      background-size: cover;
      background-position: center 38%;
      filter: grayscale(1) brightness(0.5);
      opacity: 0.18;
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,168,75,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,168,75,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .hero-glow {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(200,168,75,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-gradient {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(6,8,8,0.15) 0%,
        rgba(6,8,8,0.40) 50%,
        rgba(6,8,8,0.95) 100%
      );
    }
    .hero-content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      max-width: 800px;
      width: 100%;
    }
    .hero-eyebrow {
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.6em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 2rem;
    }
    .hero-eyebrow span.rule {
      display: inline-block;
      width: 28px;
      height: 1px;
      background: var(--gold);
    }
    .zmark {
      width: min(90px, 18vw);
      height: auto;
      margin-bottom: 1.75rem;
      filter: drop-shadow(0 0 28px rgba(200,168,75,0.45));
    }
    .wordmark {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(4.5rem, 17vw, 11rem);
      letter-spacing: -0.05em;
      line-height: 0.9;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .wordmark-sub {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(0.7rem, 1.4vw, 1.1rem);
      letter-spacing: 0.45em;
      color: rgba(247,243,236,0.28);
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .hero-comment {
      font-size: 10px;
      font-weight: 700;
      font-style: italic;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }
    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      width: 100%;
      max-width: 320px;
    }
    .btn {
      display: block;
      padding: 0.9rem 1.5rem;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      text-decoration: none;
      border: 1px solid;
      cursor: crosshair;
      transition: background 0.25s, color 0.25s, border-color 0.25s;
    }
    .btn-primary {
      color: var(--gold);
      border-color: rgba(200,168,75,0.45);
      background: transparent;
    }
    .btn-primary:hover { background: var(--gold); color: var(--bg-alt); border-color: var(--gold); }
    .btn-secondary {
      color: var(--white);
      border-color: rgba(247,243,236,0.15);
      background: transparent;
    }
    .btn-secondary:hover { border-color: rgba(247,243,236,0.45); }
    .scroll-cue {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      color: rgba(107,99,85,0.55);
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
    }
    .scroll-line {
      width: 1px;
      height: 36px;
      background: linear-gradient(to bottom, rgba(200,168,75,0.5), transparent);
    }

    /* ── Photo break ── */
    .photo-break {
      position: relative;
      height: 60vh;
      min-height: 360px;
      overflow: hidden;
    }
    .pb-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }
    .pb-ov {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, rgba(6,8,8,0.82) 0%, rgba(6,8,8,0.35) 55%, rgba(6,8,8,0.55) 100%);
    }
    .pb-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3rem var(--gutter);
    }
    .pb-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.25rem;
    }
    .pb-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(2rem, 5.5vw, 3.75rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      color: var(--white);
      text-transform: uppercase;
      max-width: 480px;
    }
    .pb-title em { font-style: normal; color: var(--gold); }
    @media (max-width: 700px) { .pb-img { background-attachment: scroll; } }

    /* ── Chapter / section shared ── */
    .section-inner {
      padding: 80px var(--gutter);
      max-width: 1200px;
      margin: 0 auto;
    }
    .s-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 1.5rem;
    }
    .s-label::before {
      content: '';
      display: inline-block;
      width: 26px;
      height: 1px;
      background: var(--gold);
    }
    .s-title {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: clamp(2rem, 4.5vw, 3.25rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 1.75rem;
    }
    .s-title .gold { color: var(--gold); }
    .s-body {
      font-size: 13px;
      line-height: 1.85;
      color: var(--fg-3);
      max-width: 620px;
      margin-bottom: 1.5rem;
    }
    .s-body em { font-style: italic; color: var(--cream); }
    .hairline { border: 0; border-top: 1px solid var(--border); }

    /* ── Stat row ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border: 1px solid var(--border-strong);
      margin-top: 3rem;
    }
    .stat-cell {
      padding: 1.75rem 1.5rem;
      border-right: 1px solid var(--border);
    }
    .stat-cell:last-child { border-right: 0; }
    .stat-num {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2rem;
      color: var(--gold);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }
    .stat-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    @media (max-width: 700px) {
      .stat-row { grid-template-columns: 1fr 1fr; }
      .stat-cell:nth-child(2) { border-right: 0; }
    }

    /* ── Map shell ── */
    .map-shell {
      margin-top: 3rem;
      border: 1px solid var(--border-strong);
      overflow: hidden;
      position: relative;
    }
    .map-shell img {
      width: 100%;
      display: block;
      filter: brightness(0.8) saturate(0.85);
      transition: filter 0.3s;
    }
    .map-shell:hover img { filter: brightness(1) saturate(1.1); }
    .map-caption {
      padding: 0.75rem 1rem;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── Stage cards ── */
    .stages-section { background: var(--green); }
    .stage-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      margin-top: 2.5rem;
    }
    .stage-card {
      background: var(--green);
      padding: 2.5rem 2rem;
      border-left: 3px solid;
      transition: background 0.25s;
    }
    .stage-card:hover { background: rgba(255,255,255,0.02); }
    .stage-time {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .stage-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.35rem;
      letter-spacing: -0.03em;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .stage-loc {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--fg-4);
      margin-bottom: 1rem;
    }
    .stage-desc {
      font-size: 12px;
      line-height: 1.7;
      color: var(--fg-3);
      margin-bottom: 1.25rem;
    }
    .stage-cap {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    @media (max-width: 900px) { .stage-grid { grid-template-columns: 1fr; } }

    /* ── Ticket / tier cards ── */
    .tier-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border-strong);
      margin-top: 2.5rem;
    }
    .tier-card {
      background: var(--bg-alt);
      padding: 2.5rem 2rem;
      border: 1px solid rgba(200,168,75,0.12);
      transition: border-color 0.25s, background 0.25s;
    }
    .tier-card:hover { border-color: rgba(200,168,75,0.45); background: rgba(200,168,75,0.04); }
    .tier-num {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 2.25rem;
      color: var(--gold);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .tier-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .tier-name {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: -0.02em;
      color: var(--white);
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .tier-desc {
      font-size: 12px;
      line-height: 1.75;
      color: var(--fg-3);
    }
    @media (max-width: 700px) { .tier-grid { grid-template-columns: 1fr; } }

    /* ── Access CTA ── */
    .access-section { background: var(--bg-alt); }
    .access-inner {
      padding: 80px var(--gutter);
      max-width: 760px;
      margin: 0 auto;
      text-align: center;
    }
    .access-inner .s-label { justify-content: center; }
    .access-inner .s-label::before { display: none; }

    /* ── Footer ── */
    footer {
      padding: 4rem 2rem;
      text-align: center;
      border-top: 1px solid var(--border-soft);
      background: var(--bg-alt);
    }
    .footer-logo {
      font-family: var(--font-display);
      font-weight: 900;
      font-size: 1.75rem;
      letter-spacing: -0.04em;
      color: var(--white);
      margin-bottom: 0.6rem;
    }
    .footer-loc {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .footer-email a {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
    }
    .footer-email a:hover { text-decoration: underline; }
    .footer-copy {
      margin-top: 2rem;
      font-size: 9px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(107,99,85,0.5);
    }
  </style>
</head>
